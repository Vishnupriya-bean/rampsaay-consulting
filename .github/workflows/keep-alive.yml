name: Keep Server Alive

on:
  schedule:
    # Runs every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Frontend
        run: curl -sL -w "%{http_code} %{url_effective}\\n" "https://rampsaayconsulting.xyz/" -o /dev/null
      
      - name: Ping Directus API
        run: curl -sL -w "%{http_code} %{url_effective}\\n" "https://rampsaayconsulting.xyz/rampsaayconsulting-cms/items/blogs?limit=1" -o /dev/null
