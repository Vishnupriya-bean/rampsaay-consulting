server {
    listen 80;
    listen [::]:80;
    server_name rampsaayconsulting.xyz www.rampsaayconsulting.xyz;

    # Redirect HTTP → HTTPS (and force non-www)
    return 301 https://rampsaayconsulting.xyz$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.rampsaayconsulting.xyz;

    ssl_certificate     /etc/letsencrypt/live/rampsaayconsulting.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rampsaayconsulting.xyz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Redirect www HTTPS to non-www HTTPS
    return 301 https://rampsaayconsulting.xyz$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rampsaayconsulting.xyz;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/rampsaayconsulting.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rampsaayconsulting.xyz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Document root (where dist/ is copied)
    root  /var/www/rampsaayconsulting.xyz/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Cache static assets (JS/CSS have hashed filenames from Vite)
    location ~* \.(js|css|woff2|woff|ttf|svg|ico|png|jpg|jpeg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Directus CMS Subfolder API
    location /cms/ {
        # Trailing slash is critical to strip /cms/ before passing to Directus
        proxy_pass http://localhost:8055/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_addrs;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ApexFit React application
    location /apex-fit {
        try_files $uri $uri/ /apex-fit/index.html;
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
